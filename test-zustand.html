<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zustand 스토어 테스트</title>
    <style>
        body { font-family: monospace; margin: 40px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 800px; }
        .test-button { background: #007acc; color: white; border: none; padding: 10px 20px; 
                      border-radius: 4px; cursor: pointer; margin: 10px 5px; }
        .test-button:hover { background: #005a9e; }
        .results { background: #f8f9fa; padding: 15px; border-radius: 4px; margin-top: 15px; 
                  font-size: 14px; white-space: pre-wrap; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-box { background: #e9ecef; padding: 10px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Zustand 스토어 테스트</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div id="totalTags">총 태그: 0</div>
            </div>
            <div class="stat-box">
                <div id="selectedTags">선택된 태그: 0</div>
            </div>
            <div class="stat-box">
                <div id="reviewedTags">검토된 태그: 0</div>
            </div>
        </div>
        
        <button class="test-button" onclick="createTestTags()">테스트 태그 생성</button>
        <button class="test-button" onclick="selectRandomTags()">랜덤 선택</button>
        <button class="test-button" onclick="toggleReviewStatus()">검토 상태 토글</button>
        <button class="test-button" onclick="clearAllTags()">모든 태그 삭제</button>
        <button class="test-button" onclick="showTagsByPage()">페이지별 태그</button>
        
        <div id="results" class="results"></div>
    </div>

    <script type="module">
        import { create } from 'https://cdn.skypack.dev/zustand';
        
        // 간단한 Zustand 스토어 (immer 없이)
        const useTagStore = create((set, get) => ({
            tags: [],
            selectedTagIds: [],
            
            createTag: (tagData) => set((state) => ({
                tags: [...state.tags, {
                    id: `tag-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`,
                    createdAt: Date.now(),
                    isReviewed: false,
                    ...tagData
                }]
            })),
            
            selectTag: (id) => set((state) => ({
                selectedTagIds: state.selectedTagIds.includes(id) 
                    ? state.selectedTagIds 
                    : [...state.selectedTagIds, id]
            })),
            
            toggleTagSelection: (id) => set((state) => ({
                selectedTagIds: state.selectedTagIds.includes(id)
                    ? state.selectedTagIds.filter(tagId => tagId !== id)
                    : [...state.selectedTagIds, id]
            })),
            
            toggleReviewStatus: (id) => set((state) => ({
                tags: state.tags.map(tag => 
                    tag.id === id ? { ...tag, isReviewed: !tag.isReviewed } : tag
                )
            })),
            
            clearAllTags: () => set({ tags: [], selectedTagIds: [] }),
            
            getTagsByPage: (page) => {
                return get().tags.filter(tag => tag.page === page);
            },
            
            get stats() {
                const tags = get().tags;
                const selectedCount = get().selectedTagIds.length;
                const reviewedCount = tags.filter(tag => tag.isReviewed).length;
                
                return {
                    total: tags.length,
                    selected: selectedCount,
                    reviewed: reviewedCount
                };
            }
        }));

        // 전역에서 접근할 수 있도록 설정
        window.tagStore = useTagStore;
        
        function updateStats() {
            const stats = useTagStore.getState().stats;
            document.getElementById('totalTags').textContent = `총 태그: ${stats.total}`;
            document.getElementById('selectedTags').textContent = `선택된 태그: ${stats.selected}`;
            document.getElementById('reviewedTags').textContent = `검토된 태그: ${stats.reviewed}`;
        }
        
        // 스토어 상태 변경 구독
        useTagStore.subscribe(updateStats);
        
        window.createTestTags = function() {
            const { createTag } = useTagStore.getState();
            const categories = ['Equipment', 'Line', 'Instrument', 'DrawingNumber'];
            
            for (let i = 1; i <= 10; i++) {
                createTag({
                    text: `TEST-${100 + i}${i % 2 ? 'A' : 'B'}`,
                    category: categories[i % 4],
                    page: Math.floor(i / 3) + 1,
                    bbox: { x1: 100 + i*10, y1: 200 + i*5, x2: 180 + i*10, y2: 225 + i*5 }
                });
            }
            
            document.getElementById('results').textContent = '✅ 10개 테스트 태그 생성 완료';
        };
        
        window.selectRandomTags = function() {
            const { tags, selectTag } = useTagStore.getState();
            if (tags.length === 0) {
                document.getElementById('results').textContent = '❌ 선택할 태그가 없습니다';
                return;
            }
            
            const randomCount = Math.min(3, tags.length);
            const randomTags = tags.sort(() => 0.5 - Math.random()).slice(0, randomCount);
            
            randomTags.forEach(tag => selectTag(tag.id));
            
            document.getElementById('results').textContent = 
                `✅ ${randomCount}개 태그 선택: ${randomTags.map(t => t.text).join(', ')}`;
        };
        
        window.toggleReviewStatus = function() {
            const { tags, toggleReviewStatus } = useTagStore.getState();
            if (tags.length === 0) {
                document.getElementById('results').textContent = '❌ 토글할 태그가 없습니다';
                return;
            }
            
            const randomTag = tags[Math.floor(Math.random() * tags.length)];
            toggleReviewStatus(randomTag.id);
            
            document.getElementById('results').textContent = 
                `✅ ${randomTag.text} 검토 상태 토글됨 (${randomTag.isReviewed ? '미검토→검토' : '검토→미검토'})`;
        };
        
        window.clearAllTags = function() {
            useTagStore.getState().clearAllTags();
            document.getElementById('results').textContent = '✅ 모든 태그 삭제 완료';
        };
        
        window.showTagsByPage = function() {
            const { tags, getTagsByPage } = useTagStore.getState();
            if (tags.length === 0) {
                document.getElementById('results').textContent = '❌ 표시할 태그가 없습니다';
                return;
            }
            
            let result = '📄 페이지별 태그 목록:\n';
            const pages = [...new Set(tags.map(tag => tag.page))].sort();
            
            pages.forEach(page => {
                const pageTags = getTagsByPage(page);
                result += `Page ${page}: ${pageTags.length}개 - ${pageTags.map(t => t.text).join(', ')}\n`;
            });
            
            document.getElementById('results').textContent = result;
        };
        
        // 초기 통계 업데이트
        updateStats();
        
        console.log('✅ Zustand 스토어 테스트 준비 완료');
        console.log('전역 객체: window.tagStore');
    </script>
</body>
</html>
